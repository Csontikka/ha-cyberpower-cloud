name: Lock

on:
  schedule:
    - cron: "0 1 * * *"

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: lock

jobs:
  lock:
    name: Lock closed threads
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@v6
        with:
          issue-inactive-days: 30
          pr-inactive-days: 30
          issue-lock-reason: resolved
          pr-lock-reason: resolved
